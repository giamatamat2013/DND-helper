name: Deploy Tamat13
on:
  push:
    branches:
      - Tamat13

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Subfolder
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
          target-folder: Tamat13
          branch: main # זה ידחוף את התיקייה לתוך ה-Tamat13 שלך
